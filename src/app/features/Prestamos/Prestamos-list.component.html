<p-toolbar styleClass="mb-6">
    <ng-template pTemplate="start">
        <p-button
            label="Nuevo"
            icon="pi pi-plus"
            severity="secondary"
            class="mr-2"
            (click)="openNew()">
        </p-button>
    </ng-template>
</p-toolbar>

<p-table
    #dt
    [value]="prestamos"
    [(selection)]="selectedPrestamos"
    dataKey="id_prestamo"
    [paginator]="true"
    [rows]="10"
    [loading]="loading"
    [rowHover]="true"
    [rowsPerPageOptions]="[10,20,30]"
    [globalFilterFields]="[
        'monto',
        'interes',
        'cuotas',
        'estado'
    ]"
>

    <ng-template pTemplate="caption">
        <div class="flex items-center justify-between">
            <h5 class="m-0">Gestión de Préstamos</h5>

            <p-iconfield>
                <p-inputicon styleClass="pi pi-search"></p-inputicon>

                <input
                    pInputText
                    type="text"
                    (input)="onGlobalFilter($event)"
                    placeholder="Buscar..." />
            </p-iconfield>
        </div>
    </ng-template>

    <ng-template pTemplate="header">
        <tr>
            <th>Monto</th>
            <th>Interés</th>
            <th>Cuotas</th>
            <th>Estado</th>
            <th>Fecha Inicio</th>
            <th>Fecha Fin</th>
            <th>ID Cliente</th>
            <th>ID Cuenta</th>
            <th></th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-prestamo>
        <tr>
            <td>{{ prestamo.monto }}</td>
            <td>{{ prestamo.interes }}%</td>
            <td>{{ prestamo.cuotas }}</td>
            <td>{{ prestamo.estado }}</td>
            <td>{{ prestamo.fecha_inicio }}</td>
            <td>{{ prestamo.fecha_fin }}</td>
            <td>{{ prestamo.id_cliente }}</td>
            <td>{{ prestamo.id_cuenta }}</td>

            <td>
                <p-button
                    icon="pi pi-pencil"
                    class="mr-2"
                    [outlined]="true"
                    [rounded]="true"
                    (click)="editPrestamo(prestamo)">
                </p-button>

                <p-button
                    icon="pi pi-trash"
                    severity="danger"
                    [outlined]="true"
                    [rounded]="true"
                    (click)="deletePrestamo(prestamo)">
                </p-button>
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog
    [(visible)]="prestamoDialog"
    [style]="{ width: '500px' }"
    header="Detalles del Préstamo"
    [modal]="true">

    <div class="flex flex-col gap-4">

        <div>
            <label>Monto</label>
            <input type="number" pInputText [(ngModel)]="prestamo.monto" />
        </div>

        <div>
            <label>Interés</label>
            <input type="number" pInputText [(ngModel)]="prestamo.interes" />
        </div>

        <div>
            <label>Cuotas</label>
            <input type="number" pInputText [(ngModel)]="prestamo.cuotas" />
        </div>

        <div>
            <label>Estado</label>
            <input type="text" pInputText [(ngModel)]="prestamo.estado" />
        </div>

        <div>
            <label>Fecha Inicio</label>
            <input type="date" pInputText [(ngModel)]="prestamo.fecha_inicio" />
        </div>

        <div>
            <label>Fecha Fin</label>
            <input type="date" pInputText [(ngModel)]="prestamo.fecha_fin" />
        </div>

        <div>
            <label>ID Cliente</label>
            <input type="text" pInputText [(ngModel)]="prestamo.id_cliente" />
        </div>

        <div>
            <label>ID Cuenta</label>
            <input type="text" pInputText [(ngModel)]="prestamo.id_cuenta" />
        </div>

    </div>

    <ng-template pTemplate="footer">
        <p-button
            label="Cancelar"
            icon="pi pi-times"
            text
            (click)="hideDialog()">
        </p-button>

        <p-button
            label="Guardar"
            icon="pi pi-check"
            (click)="savePrestamo()">
        </p-button>
    </ng-template>
</p-dialog>

<p-confirmdialog [style]="{ width: '450px' }"></p-confirmdialog>
