<app-floating-configurator />

<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">
        <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-12 px-6 sm:px-16" style="border-radius: 53px; max-width: 520px">
                <div class="text-center mb-6">
                    <img src="assets/logos/logobanco.jpg" alt="Logo Banco" class="mx-auto mb-4 w-24 h-auto" />
                    <i class="pi pi-user-plus text-3xl text-primary mb-3"></i>
                    <div class="text-surface-900 dark:text-surface-0 text-2xl font-semibold mb-2">Crear Cuenta</div>
                    <span class="text-muted-color font-medium text-sm">Regístrate con tu ID de cliente</span>
                </div>

                <div>
                    <input pInputText type="text" placeholder="Nombre de usuario" class="w-full mb-3" [(ngModel)]="username" />

                    <input pInputText type="text" placeholder="ID del cliente" class="w-full mb-3" [(ngModel)]="id_cliente" />

                    <p-password [(ngModel)]="contrasena" placeholder="Contraseña" [feedback]="false" [toggleMask]="true" styleClass="w-full mb-3"></p-password>

                    <p-password [(ngModel)]="confirmContrasena" placeholder="Confirmar contraseña" [feedback]="false" [toggleMask]="true" styleClass="w-full mb-3"></p-password>

                    <div *ngIf="error" class="text-red-500 text-sm text-center mb-3">{{ error }}</div>
                    <div *ngIf="mensaje" class="text-green-600 text-sm text-center mb-3">{{ mensaje }}</div>

                    <p-button label="Registrar" styleClass="w-full mb-2" [loading]="cargando" (onClick)="onRegister()"></p-button>

                    <div class="text-center mt-4">
                        <span class="text-muted-color text-sm"> ¿Ya tienes cuenta? <a routerLink="/auth/login" class="text-primary">Iniciar sesión</a> </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
