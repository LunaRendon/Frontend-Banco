<app-floating-configurator />
<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-col items-center justify-center">
        <div style="border-radius: 56px; padding: 0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%)">
            <div class="w-full bg-surface-0 dark:bg-surface-900 py-16 px-10 sm:px-16" style="border-radius: 53px; max-width: 450px">
                <div class="text-center mb-8">
                    <img src="assets/logos/logobanco.jpg" alt="Logo Banco" class="mx-auto mb-4 w-32" />
                    <i class="pi pi-envelope text-4xl text-primary mb-4"></i>
                    <div class="text-surface-900 dark:text-surface-0 text-2xl font-medium mb-4">Recuperar Contraseña</div>
                    <span class="text-muted-color font-medium"> Introduce tu usuario para generar una contraseña temporal </span>
                </div>

                <div>
                    <label for="username" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Usuario</label>
                    <input pInputText id="username" type="text" placeholder="Nombre de usuario" class="w-full mb-4" [(ngModel)]="username" />

                    <label class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Nueva contraseña</label>
                    <p-password [(ngModel)]="nuevaContrasena" placeholder="********" [toggleMask]="true" styleClass="w-full mb-4" [fluid]="true" [feedback]="false"></p-password>

                    <label class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Confirmar contraseña</label>
                    <p-password [(ngModel)]="confirmContrasena" placeholder="********" [toggleMask]="true" styleClass="w-full mb-6" [fluid]="true" [feedback]="false"></p-password>

                    <p-button label="Cambiar contraseña" styleClass="w-full mb-4" [loading]="cargando" (onClick)="onSubmit()"></p-button>
                    <div *ngIf="mensaje" class="text-green-600 font-semibold text-center mt-4">{{ mensaje }}</div>

                    <div *ngIf="error" class="text-red-600 font-semibold text-center mt-4">{{ error }}</div>

                    <div class="text-center mt-4 text-muted-color">
                        <a routerLink="/auth/login" class="text-primary">Volver al Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
