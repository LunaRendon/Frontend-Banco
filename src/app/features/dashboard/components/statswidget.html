<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

  <!-- CLIENTES -->
  <div class="bg-gradient-to-r from-blue-500 to-blue-700 text-white p-5 rounded-2xl shadow-xl">
    <h5 class="text-sm opacity-80">Total Clientes</h5>
    <p class="text-4xl font-bold mt-2">{{ totalClientes }}</p>
  </div>

  <!-- ACTIVOS -->
  <div class="bg-gradient-to-r from-green-500 to-green-700 text-white p-5 rounded-2xl shadow-xl">
    <h5 class="text-sm opacity-80">Clientes Activos</h5>
    <p class="text-4xl font-bold mt-2">{{ clientesActivos }}</p>
  </div>

  <!-- CUENTAS -->
  <div class="bg-gradient-to-r from-purple-500 to-purple-700 text-white p-5 rounded-2xl shadow-xl">
    <h5 class="text-sm opacity-80">Cuentas Totales</h5>
    <p class="text-4xl font-bold mt-2">{{ cuentasTotales }}</p>
  </div>

</div>

<!-- GRÁFICA -->
<div class="mt-6 bg-white p-5 rounded-2xl shadow-xl">
  <h4 class="mb-4 font-semibold text-gray-700">Resumen General</h4>

  <p-chart type="bar" [data]="chartData"></p-chart>
</div>
