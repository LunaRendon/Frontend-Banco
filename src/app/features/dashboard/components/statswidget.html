<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- CLIENTES TOTALES -->
    <div class="bg-gradient-to-r from-blue-500 to-blue-700 text-white p-5 rounded-2xl shadow-xl">
        <div class="flex items-center gap-3 mb-2">
            <span style="font-size: 1.4rem">👥</span>
            <h5 class="text-sm uppercase tracking-wide opacity-80 m-0">Total Clientes</h5>
        </div>
        <p class="text-4xl font-bold m-0">{{ loadingClientes ? '…' : totalClientes }}</p>
        <p class="text-xs opacity-70 mt-1 m-0">registrados en el banco</p>
    </div>

    <!-- CLIENTES VERIFICADOS -->
    <div class="bg-gradient-to-r from-emerald-500 to-emerald-700 text-white p-5 rounded-2xl shadow-xl">
        <div class="flex items-center gap-3 mb-2">
            <span style="font-size: 1.4rem">✅</span>
            <h5 class="text-sm uppercase tracking-wide opacity-80 m-0">Con correo</h5>
        </div>
        <p class="text-4xl font-bold m-0">{{ loadingClientes ? '…' : clientesActivos }}</p>
        <p class="text-xs opacity-70 mt-1 m-0">clientes verificados</p>
    </div>

    <!-- CUENTAS TOTALES -->
    <div class="bg-gradient-to-r from-violet-500 to-violet-700 text-white p-5 rounded-2xl shadow-xl">
        <div class="flex items-center gap-3 mb-2">
            <span style="font-size: 1.4rem">🏦</span>
            <h5 class="text-sm uppercase tracking-wide opacity-80 m-0">Cuentas Totales</h5>
        </div>
        <p class="text-4xl font-bold m-0">{{ loadingCuentas ? '…' : cuentasTotales }}</p>
        <p class="text-xs opacity-70 mt-1 m-0">en el sistema</p>
    </div>
</div>

<!-- Error de conexión -->
<div *ngIf="errorMsg" class="mt-4 p-3 rounded-xl text-sm flex items-center gap-2" style="background: #fff1f2; color: #be123c; border: 1px solid #fecdd3">⚠️{{ errorMsg }}</div>
