<p-toolbar styleClass="mb-6">
  <ng-template #start>
    <p-button label="Eliminar" icon="pi pi-trash" outlined severity="secondary"
      [disabled]="!selectedUsuarios || !selectedUsuarios.length"
      (onClick)="deleteSelectedUsuarios()" />
  </ng-template>
</p-toolbar>

<p-table #dt [value]="usuarios()" [(selection)]="selectedUsuarios" dataKey="id_usuario"
  [paginator]="true" [rows]="10" [loading]="loading" [rowHover]="true"
  [globalFilterFields]="['username','rol']"
  [rowsPerPageOptions]="[10,20,30]">

  <ng-template #caption>
    <div class="flex items-center justify-between">
      <h5 class="m-0">Usuarios de la Aplicación</h5>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-search" />
        <input pInputText type="text" (input)="onGlobalFilter($event)" placeholder="Buscar..." />
      </p-iconfield>
    </div>
  </ng-template>

  <ng-template #header>
    <tr>
      <th style="width:3rem"><p-tableHeaderCheckbox /></th>
      <th pSortableColumn="username">Username <p-sortIcon field="username" /></th>
      <th pSortableColumn="rol">Rol <p-sortIcon field="rol" /></th>
      <th pSortableColumn="estado">Estado <p-sortIcon field="estado" /></th>
      <th pSortableColumn="fecha_registro">Fecha Registro <p-sortIcon field="fecha_registro" /></th>
      <th style="width:8rem"></th>
    </tr>
  </ng-template>

  <ng-template #body let-u>
    <tr>
      <td><p-tableCheckbox [value]="u" /></td>
      <td>{{ u.username }}</td>
      <td>
        <span [class]="u.rol === 'admin_app' ? 'text-purple-500 font-bold' : 'text-blue-500 font-bold'">
          {{ u.rol === 'admin_app' ? 'Administrador' : 'Cliente' }}
        </span>
      </td>
      <td>
        <span [class]="u.estado ? 'text-green-500 font-bold' : 'text-red-500 font-bold'">
          {{ u.estado ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
      <td>{{ u.fecha_registro | date:'short' }}</td>
      <td>
        <p-button icon="pi pi-pencil" class="mr-2" [outlined]="true" [rounded]="true" (click)="editUsuario(u)" />
        <p-button icon="pi pi-trash" severity="danger" [outlined]="true" [rounded]="true" (click)="deleteUsuario(u)" />
      </td>
    </tr>
  </ng-template>
</p-table>

<p-dialog [(visible)]="usuarioDialog" [style]="{width: '450px'}" header="Editar Usuario" [modal]="true">
  <ng-template #content>
    <div class="flex flex-col gap-4">
      <div>
        <label class="block font-bold mb-2">Username</label>
        <input type="text" pInputText [(ngModel)]="usuario.username" required fluid />
        <small class="text-red-500" *ngIf="submitted && !usuario.username">Obligatorio.</small>
      </div>
      <div>
        <label class="block font-bold mb-2">Rol</label>
        <select [(ngModel)]="usuario.rol" class="w-full p-2 border rounded">
          <option value="cliente">Cliente</option>
          <option value="admin_app">Administrador</option>
        </select>
      </div>
      <div class="flex items-center gap-2">
        <label class="font-bold">Estado Activo</label>
        <input type="checkbox" [(ngModel)]="usuario.estado" />
      </div>
      <div>
        <label class="block font-bold mb-2">Nueva Contraseña <span class="text-gray-400 font-normal">(opcional)</span></label>
        <input type="password" pInputText [(ngModel)]="nuevaContrasena" placeholder="Dejar vacío para no cambiar" fluid />
      </div>
    </div>
  </ng-template>
  <ng-template #footer>
    <p-button label="Cancelar" icon="pi pi-times" text (click)="hideDialog()" />
    <p-button label="Guardar" icon="pi pi-check" (click)="saveUsuario()" />
  </ng-template>
</p-dialog>

<p-confirmdialog [style]="{ width: '450px' }" />
<p-toast />
